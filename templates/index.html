<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">

    <title>Math Game</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="/static/manifest.json">
</head>

<body>

<div class="container">

    <h1>Math Game</h1>

    {% if game_type %}
        <p class="mode">Mode: {{ game_type }}</p>
    {% endif %}

    {% if finished %}

        <h2>Game Over</h2>

        <p class="score">Your score: {{ score }}/10</p>

        <a class="play-again" href="/">Play Again</a>

    {% elif not question_data %}

        <form method="POST">

            <select name="game_type">

                <option value="addition">Addition</option>
                <option value="subtraction">Subtraction</option>
                <option value="multiplication">Multiplication</option>
                <option value="division">Division</option>

            </select>

            <label style="display:block; margin-top:15px; font-weight:bold;">

                {% if game_type == "multiplication" %}
                    Which times table do you want to train?
                {% elif game_type == "division" %}
                    Which division table do you want to train?
                {% else %}
                    What max number do you want to train?
                {% endif %}

            </label>

            <input type="number" name="value" min="1" required>

            <button type="submit" name="start_game">
                Start Game
            </button>

        </form>

    {% else %}

        <div class="game-info">
            <p>Round {{ round }}/10</p>
            <p>Score: {{ score }}</p>
        </div>

        <h2 class="question">
            {{ question_data.question }}
        </h2>

        <form method="POST">

            <input type="number" name="answer" placeholder="Your answer" required autofocus>

            <button type="submit">Submit</button>

        </form>

    {% endif %}

</div>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
        .then(() => console.log("SW registered"));
}
</script>

</body>
</html>
