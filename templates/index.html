<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">

    <title>Math Game</title>

    <!-- ADSENSE SCRIPT (DU BAD OM DENNA) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6875340177287559"
     crossorigin="anonymous"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- TOP BANNER AD -->
    <div class="ad-banner-top">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-6875340177287559"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>

        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <h1>Math Game</h1>

    {% if finished %}

        <h2>Game Over</h2>
        <p>Your score: {{ score }}/10</p>

        <a href="/">Play Again</a>

    {% elif not question_data %}

        <form method="POST">

            <select name="game_type">
                <option value="addition">Addition</option>
                <option value="subtraction">Subtraction</option>
                <option value="multiplication">Multiplication</option>
                <option value="division">Division</option>
            </select>

            <input type="number" name="value" min="1" required>

            <button type="submit" name="start_game">Start</button>

        </form>

    {% else %}

        <p>Round {{ round }}/10</p>
        <p>Score: {{ score }}</p>

        <h2>{{ question_data.question }}</h2>

        <form method="POST">
            <input type="number" name="answer" required>
            <button type="submit">Submit</button>
        </form>

    {% endif %}

    <div class="footer">
        <a href="/about">About</a> |
        <a href="/privacy">Privacy Policy</a>
    </div>

</div>

</body>
</html>
